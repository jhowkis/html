<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exemplo de Código</title>
</head>
<body>
    <h1>Outras Formatações</h1>
    <h2>Código-fonte</h2>
    <p>O comando abaixo em Python verifica se um número é par ou ímpar:</p>

<pre>
<code>
num = int(input("Digite um número: "))
if num % 2 == 0:
    print("O número é par.")
else:
    print("O número é ímpar.")
</code>
</pre>

</body>
</html>
